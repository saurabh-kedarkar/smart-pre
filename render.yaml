services:
  - type: web
    name: smartpre-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --upgrade pip && pip install --no-cache-dir -r backend/requirements.txt"
    startCommand: "cd backend && python main.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER
        value: "true"
    healthCheckPath: /api/health
